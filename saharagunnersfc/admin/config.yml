backend:
  name: git-gateway
  branch: main

media_folder: "photos"
public_folder: "/photos"

locale: "tr"

collections:
  - name: "announcements"
    label: "Duyurular"
    folder: "_data/announcements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Tarih", name: "date", widget: "datetime" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Haber", "Maç", "Kadro"] }
      - { label: "Özet", name: "preview", widget: "string" }
      - { label: "İçerik", name: "body", widget: "markdown" }

  - name: "players"
    label: "Oyuncular"
    folder: "_data/players"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "İsim", name: "name", widget: "string" }
      - { label: "Numara", name: "number", widget: "number" }
      - { label: "Mevki", name: "position", widget: "select", options: ["Forward", "Midfielder", "Defender", "Goalkeeper", "Head Coach", "Mascot"] }
      - { label: "Biyografi", name: "bio", widget: "text" }
      - { label: "Fotoğraf", name: "img", widget: "string", required: false }

  - name: "matches"
    label: "Maçlar"
    folder: "_data/matches"
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    fields:
      - { label: "Rakip", name: "opponent", widget: "string" }
      - { label: "Tarih", name: "date", widget: "datetime" }
      - { label: "Mekan", name: "venue", widget: "string" }
      - { label: "Durum", name: "status", widget: "select", options: ["upcoming", "live", "finished"] }
      - { label: "Bizim Skor", name: "score_home", widget: "number", required: false }
      - { label: "Rakip Skor", name: "score_away", widget: "number", required: false }
